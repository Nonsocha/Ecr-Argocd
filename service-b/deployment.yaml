apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-b
  template:
    metadata:
      labels:
        app: service-b
    spec:
      containers:
      - name: nginx
        image: 707913648704.dkr.ecr.us-east-1.amazonaws.com/service-b:a2f62e26211ddf67793cc56ab71b59918c420578
        ports:
        - containerPort: 80
