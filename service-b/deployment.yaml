apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-b
  template:
    metadata:
      labels:
        app: service-b
    spec:
      containers:
      - name: nginx
        image: 707913648704.dkr.ecr.us-east-1.amazonaws.com/service-b:d9b6bab798a8a151c5a9dc26828241ca8b2b04a9
        ports:
        - containerPort: 80
