apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: multi-cluster-gitops
  namespace: argocd

spec:
  generators:
    - matrix:
        generators:
          - list:
              elements:
                - cluster: cluster1
                  server: https://B2379F51DCD4EDE28535B15208E06A4C.gr7.us-east-1.eks.amazonaws.com
                - cluster: cluster2
                  server: https://A95625E88BDAD64C149DCA04C52B3DD8.gr7.us-east-1.eks.amazonaws.com

          - git:
              repoURL: https://github.com/Nonsocha/Gittops-cluster.git
              revision: HEAD
              directories:
                - path: service-*

  template:
    metadata:
      name: "{{cluster}}-{{path.basename}}"

    spec:
      project: default

      source:
        repoURL: https://github.com/Nonsocha/Gittops-cluster.git
        targetRevision: HEAD
        path: "{{path}}"

      destination:
        server: "{{server}}"
        namespace: default

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
